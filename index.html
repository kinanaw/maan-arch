<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מען — ניהול פרויקטים</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; direction: rtl; background: #f5f4f0; color: #1a1a1a; }
:root {
  --blue: #185FA5; --blue-light: #E6F1FB;
  --amber: #BA7517; --amber-light: #FAEEDA;
  --red: #A32D2D; --red-light: #FCEBEB;
  --green: #3B6D11; --green-light: #EAF3DE;
  --gray-light: #F1EFE8;
  --border: rgba(0,0,0,0.12);
  --bg: #ffffff; --bg2: #f5f4f0;
  --text: #1a1a1a; --text2: #666;
  --radius: 8px; --radius-lg: 12px;
}

/* LOGIN */
.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f5f4f0; }
.login-card { background: #fff; border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 2.5rem 2rem; width: 100%; max-width: 360px; text-align: center; }
.login-card h1 { font-size: 22px; font-weight: 600; margin-bottom: 0.25rem; }
.login-card p { font-size: 13px; color: var(--text2); margin-bottom: 1.75rem; }
.login-card input { width: 100%; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 9px 12px; font-size: 14px; margin-bottom: 10px; font-family: inherit; direction: rtl; background: var(--bg); color: var(--text); }
.login-card input:focus { outline: none; border-color: var(--blue); }
.login-card button { width: 100%; background: var(--blue); color: #fff; border: none; border-radius: var(--radius); padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; margin-top: 4px; }
.login-card button:hover { background: #0C447C; }
.login-error { color: var(--red); font-size: 12px; margin-top: 8px; min-height: 18px; }

/* APP */
.app { max-width: 1300px; margin: 0 auto; padding: 1.5rem; }
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; background: var(--bg); border-radius: var(--radius-lg); padding: 1rem 1.25rem; border: 0.5px solid var(--border); }
.topbar h1 { font-size: 20px; font-weight: 600; }
.topbar-right { display: flex; gap: 8px; align-items: center; }
.btn { background: transparent; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--text); font-family: inherit; direction: rtl; }
.btn:hover { background: var(--bg2); }
.btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn-primary:hover { background: #0C447C; }
.btn-danger { color: var(--red); border-color: var(--red); }
.btn-danger:hover { background: var(--red-light); }
.filter-bar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; background: var(--bg); border-radius: var(--radius); padding: 0.75rem 1rem; border: 0.5px solid var(--border); }
.filter-bar select, .filter-bar input { border: 0.5px solid var(--border); border-radius: var(--radius); padding: 5px 10px; font-size: 13px; background: var(--bg); color: var(--text); font-family: inherit; direction: rtl; }
.filter-bar input { flex: 1; min-width: 140px; }
.status-tabs { display: flex; gap: 4px; margin-bottom: 1rem; flex-wrap: wrap; }
.tab { padding: 5px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 0.5px solid var(--border); background: var(--bg); color: var(--text2); font-family: inherit; }
.tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
.table-wrap { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow-x: auto; }
.projects-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.projects-table th { text-align: right; padding: 10px 12px; font-weight: 500; color: var(--text2); border-bottom: 0.5px solid var(--border); font-size: 12px; white-space: nowrap; background: var(--bg2); }
.projects-table td { padding: 10px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
.projects-table tr:last-child td { border-bottom: none; }
.projects-table tr:hover td { background: var(--bg2); cursor: pointer; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.badge-red { background: var(--red-light); color: var(--red); }
.badge-amber { background: var(--amber-light); color: var(--amber); }
.badge-blue { background: var(--blue-light); color: var(--blue); }
.badge-green { background: var(--green-light); color: var(--green); }
.badge-gray { background: var(--gray-light); color: #5F5E5A; }
.priority-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-left: 6px; }
.sync-indicator { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.conn-status { font-size: 11px; padding: 3px 8px; border-radius: 20px; }
.conn-ok { background: var(--green-light); color: var(--green); }
.conn-err { background: var(--red-light); color: var(--red); }
.conn-pending { background: var(--amber-light); color: var(--amber); }
.empty-state { text-align: center; padding: 3rem; color: var(--text2); font-size: 14px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-start; justify-content: center; padding-top: 60px; z-index: 100; }
.modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 1.5rem; width: 100%; max-width: 580px; max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
.modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1/-1; }
.form-group label { font-size: 12px; color: var(--text2); font-weight: 500; }
.form-group input, .form-group select, .form-group textarea { border: 0.5px solid var(--border); border-radius: var(--radius); padding: 7px 10px; font-size: 13px; background: var(--bg); color: var(--text); font-family: inherit; direction: rtl; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--blue); }
.form-group textarea { resize: vertical; min-height: 64px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-start; margin-top: 1.25rem; padding-top: 1rem; border-top: 0.5px solid var(--border); }
.footer { margin-top: 0.75rem; font-size: 12px; color: var(--text2); display: flex; justify-content: space-between; padding: 0 0.25rem; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- מסך כניסה -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h1>מען אדריכלים</h1>
    <p>ניהול פרויקטים — כניסה למשרד</p>
    <input type="email" id="loginEmail" placeholder="אימייל" autocomplete="username">
    <input type="password" id="loginPassword" placeholder="סיסמה" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">כניסה</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- האפליקציה -->
<div id="mainApp" style="display:none">
  <div class="app">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <h1>מען — ניהול פרויקטים</h1>
        <span class="conn-status conn-ok" id="connStatus">מחובר</span>
      </div>
      <div class="topbar-right">
        <span class="sync-indicator">
          <span class="sync-dot" id="syncDot" style="background:#3B6D11"></span>
          <span id="syncText">סנכרון פעיל</span>
        </span>
        <span id="userEmail" style="font-size:12px;color:var(--text2)"></span>
        <button class="btn" onclick="doLogout()">יציאה</button>
        <button class="btn btn-primary" onclick="openAdd()">+ פרויקט חדש</button>
      </div>
    </div>

    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="חיפוש לפי שם..." oninput="renderTable()">
      <select id="filterPriority" onchange="renderTable()">
        <option value="">כל העדיפויות</option>
        <option>דחוף מאוד</option><option>דחוף</option><option>חשוב</option><option>רגיל</option>
      </select>
      <select id="filterWorker" onchange="renderTable()"><option value="">כל הצוות</option></select>
      <select id="filterStage" onchange="renderTable()">
        <option value="">כל השלבים</option>
        <option>בבקשה למידע</option><option>בבקשה להיתר</option>
        <option>בבקרה מרחבית</option><option>בתכן</option><option>תב"ע</option>
      </select>
    </div>

    <div class="status-tabs">
      <button class="tab active" onclick="setTab('הכל')" id="tab-הכל">הכל (<span id="cnt-הכל">0</span>)</button>
      <button class="tab" onclick="setTab('בטיפול משרדי')" id="tab-בטיפול משרדי">בטיפול משרדי (<span id="cnt-בטיפול משרדי">0</span>)</button>
      <button class="tab" onclick="setTab('בטיפול גורם מאשר')" id="tab-בטיפול גורם מאשר">גורם מאשר (<span id="cnt-בטיפול גורם מאשר">0</span>)</button>
      <button class="tab" onclick="setTab('בטיפול רישוי זמין')" id="tab-בטיפול רישוי זמין">רישוי זמין (<span id="cnt-בטיפול רישוי זמין">0</span>)</button>
    </div>

    <div class="table-wrap">
      <table class="projects-table">
        <thead>
          <tr>
            <th>שם עבודה</th><th>שלב ועדה</th><th>עדיפות</th>
            <th>איפה עומד</th><th>מי מטפל</th><th>עדכון אחרון</th>
            <th>מ. בקשה</th><th>הערות</th><th>לינק</th><th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div id="emptyState" class="empty-state" style="display:none">אין פרויקטים תואמים</div>
    </div>

    <div class="footer">
      <span id="countLabel"></span>
      <span id="lastSync"></span>
    </div>
  </div>
</div>

<!-- מודאל עריכה -->
<div id="modalWrap" style="display:none">
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h2 id="modalTitle">פרויקט חדש</h2>
      <div class="form-grid">
        <div class="form-group full"><label>שם עבודה *</label><input id="f_name" placeholder="שם הפרויקט"></div>
        <div class="form-group"><label>שלב בועדה</label>
          <select id="f_stage"><option value="">—</option>
            <option>בבקשה למידע</option><option>בבקשה להיתר</option>
            <option>בבקרה מרחבית</option><option>בתכן</option><option>תב"ע</option>
          </select>
        </div>
        <div class="form-group"><label>עדיפות</label>
          <select id="f_priority">
            <option>דחוף מאוד</option><option>דחוף</option>
            <option selected>חשוב</option><option>רגיל</option>
          </select>
        </div>
        <div class="form-group"><label>איפה זה עומד</label>
          <select id="f_status">
            <option>בטיפול משרדי</option>
            <option>בטיפול גורם מאשר</option>
            <option>בטיפול רישוי זמין</option>
          </select>
        </div>
        <div class="form-group"><label>מי עובד על זה</label><input id="f_worker" placeholder="שם"></div>
        <div class="form-group"><label>תאריך התחלה</label><input type="date" id="f_startDate"></div>
        <div class="form-group"><label>מספר בקשה</label><input id="f_reqNum" placeholder="10000..."></div>
        <div class="form-group"><label>שלב תשלום</label>
          <select id="f_payment"><option value="">—</option>
            <option>מקדמה</option><option>לא התקבל תשלום</option><option>שולם</option>
          </select>
        </div>
        <div class="form-group full"><label>תהליך</label><input id="f_process" placeholder="תיאור השלב הנוכחי"></div>
        <div class="form-group full"><label>הערות</label><textarea id="f_notes" placeholder="הערות נוספות"></textarea></div>
        <div class="form-group full"><label>לינק רישוי</label><input id="f_link" placeholder="https://rishuybniya.moin.gov.il/..."></div>
        <div class="form-group full"><label>נתיב קובץ (W:\...)</label><input id="f_filepath" placeholder="W:\aaw-2017\..."></div>
        <div class="form-group full"><label>הערות ועדה</label><input id="f_committeeNotes" placeholder="הערות מהועדה"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveProject()">שמור</button>
        <button class="btn" onclick="closeModal()">ביטול</button>
        <button class="btn btn-danger" id="deleteBtn" onclick="deleteProject()" style="margin-right:auto;display:none">מחק פרויקט</button>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAmUKsBA9iRNdl7Vz_h4AWqZOhvvmNP4fA",
  authDomain: "maanarch-5d5ee.firebaseapp.com",
  projectId: "maanarch-5d5ee",
  storageBucket: "maanarch-5d5ee.firebasestorage.app",
  messagingSenderId: "553922854517",
  appId: "1:553922854517:web:38e7c89a63d82caecd823c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const PRIORITY_COLORS = {"דחוף מאוד":"badge-red","דחוף":"badge-amber","חשוב":"badge-blue","רגיל":"badge-gray"};
const PRIORITY_DOT = {"דחוף מאוד":"#E24B4A","דחוף":"#EF9F27","חשוב":"#378ADD","רגיל":"#888780"};
let projects = [], currentTab = 'הכל', editingId = null, unsubscribe = null;

// AUTH
auth.onAuthStateChanged(user => {
  if(user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('userEmail').textContent = user.email;
    startListener();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'none';
    if(unsubscribe) { unsubscribe(); unsubscribe = null; }
  }
});

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;
  const err = document.getElementById('loginError');
  err.textContent = '';
  if(!email || !pass) { err.textContent = 'יש למלא אימייל וסיסמה'; return; }
  auth.signInWithEmailAndPassword(email, pass).catch(e => {
    err.textContent = e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found'
      ? 'אימייל או סיסמה שגויים' : 'שגיאת כניסה, נסה שנית';
  });
}

function doLogout() { auth.signOut(); }

// FIRESTORE
function startListener() {
  if(unsubscribe) unsubscribe();
  unsubscribe = db.collection('projects').orderBy('lastUpdate','desc').onSnapshot(snap => {
    projects = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderTable(); updateCounts();
    document.getElementById('lastSync').textContent = 'עדכון: ' + new Date().toLocaleTimeString('he-IL');
  }, () => {
    document.getElementById('connStatus').className = 'conn-status conn-err';
    document.getElementById('connStatus').textContent = 'שגיאת חיבור';
  });
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const fp = document.getElementById('filterPriority').value;
  const fw = document.getElementById('filterWorker').value;
  const fs = document.getElementById('filterStage').value;
  return projects.filter(p => {
    if(q && !(p.name||'').toLowerCase().includes(q)) return false;
    if(fp && p.priority!==fp) return false;
    if(fw && p.worker!==fw) return false;
    if(fs && p.stage!==fs) return false;
    if(currentTab!=='הכל' && p.status!==currentTab) return false;
    return true;
  });
}

function updateCounts() {
  ['הכל','בטיפול משרדי','בטיפול גורם מאשר','בטיפול רישוי זמין'].forEach(s => {
    const el = document.getElementById('cnt-'+s);
    if(el) el.textContent = s==='הכל' ? projects.length : projects.filter(p=>p.status===s).length;
  });
  const workers = [...new Set(projects.map(p=>p.worker).filter(Boolean))];
  const fw = document.getElementById('filterWorker');
  const cur = fw.value;
  fw.innerHTML = '<option value="">כל הצוות</option>' + workers.map(w=>`<option${w===cur?' selected':''}>${w}</option>`).join('');
}

function renderTable() {
  const filtered = getFiltered();
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  document.getElementById('countLabel').textContent = filtered.length + ' פרויקטים';
  if(!filtered.length) { tbody.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  tbody.innerHTML = filtered.map(p => {
    const badge = PRIORITY_COLORS[p.priority]||'badge-gray';
    const dot = PRIORITY_DOT[p.priority]||'#888';
    const upd = (p.lastUpdate||'').toString().slice(0,10);
    const shortName = (p.worker||'').split(' ')[0]||'—';
    const linkCell = p.link
      ? `<a href="${p.link}" target="_blank" onclick="event.stopPropagation()">🔗</a>`
      : (p.filepath ? `<span title="${p.filepath}">📁</span>` : '—');
    return `<tr ondblclick="openEdit('${p.id}')">
      <td><span class="priority-dot" style="background:${dot}"></span><strong style="font-weight:500">${p.name}</strong>${p.process?`<br><span style="font-size:11px;color:#888">${p.process}</span>`:''}</td>
      <td style="font-size:12px">${p.stage||'—'}</td>
      <td><span class="badge ${badge}">${p.priority||'—'}</span></td>
      <td style="font-size:12px;color:#888">${p.status||'—'}</td>
      <td style="font-size:12px">${shortName}</td>
      <td style="font-size:11px;color:#888">${upd}</td>
      <td style="font-size:11px">${p.reqNum||'—'}</td>
      <td style="font-size:11px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${p.notes||''}">${p.notes||'—'}</td>
      <td style="text-align:center">${linkCell}</td>
      <td><button class="btn" style="padding:3px 8px;font-size:11px" onclick="event.stopPropagation();openEdit('${p.id}')">עריכה</button></td>
    </tr>`;
  }).join('');
}

function setTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  renderTable();
}

function openAdd() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'פרויקט חדש';
  document.getElementById('deleteBtn').style.display = 'none';
  ['f_name','f_stage','f_worker','f_startDate','f_reqNum','f_payment','f_process','f_notes','f_link','f_filepath','f_committeeNotes'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('f_priority').value = 'חשוב';
  document.getElementById('f_status').value = 'בטיפול משרדי';
  document.getElementById('modalWrap').style.display = 'block';
}

function openEdit(id) {
  const p = projects.find(x=>x.id===id); if(!p) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'עריכת פרויקט';
  document.getElementById('deleteBtn').style.display = 'block';
  document.getElementById('f_name').value = p.name||'';
  document.getElementById('f_stage').value = p.stage||'';
  document.getElementById('f_priority').value = p.priority||'חשוב';
  document.getElementById('f_status').value = p.status||'בטיפול משרדי';
  document.getElementById('f_worker').value = p.worker||'';
  document.getElementById('f_startDate').value = p.startDate||'';
  document.getElementById('f_reqNum').value = p.reqNum||'';
  document.getElementById('f_payment').value = p.payment||'';
  document.getElementById('f_process').value = p.process||'';
  document.getElementById('f_notes').value = p.notes||'';
  document.getElementById('f_link').value = p.link||'';
  document.getElementById('f_filepath').value = p.filepath||'';
  document.getElementById('f_committeeNotes').value = p.committeeNotes||'';
  document.getElementById('modalWrap').style.display = 'block';
}

function closeModal() { document.getElementById('modalWrap').style.display='none'; }

function saveProject() {
  const name = document.getElementById('f_name').value.trim();
  if(!name) { alert('יש להכניס שם עבודה'); return; }
  const data = {
    name, stage: document.getElementById('f_stage').value,
    priority: document.getElementById('f_priority').value,
    status: document.getElementById('f_status').value,
    worker: document.getElementById('f_worker').value.trim(),
    startDate: document.getElementById('f_startDate').value,
    reqNum: document.getElementById('f_reqNum').value.trim(),
    payment: document.getElementById('f_payment').value,
    process: document.getElementById('f_process').value.trim(),
    notes: document.getElementById('f_notes').value.trim(),
    link: document.getElementById('f_link').value.trim(),
    filepath: document.getElementById('f_filepath').value.trim(),
    committeeNotes: document.getElementById('f_committeeNotes').value.trim(),
    lastUpdate: new Date().toISOString().split('T')[0]
  };
  if(editingId) db.collection('projects').doc(editingId).update(data);
  else db.collection('projects').add(data);
  closeModal();
}

function deleteProject() {
  if(!editingId || !confirm('למחוק פרויקט זה?')) return;
  db.collection('projects').doc(editingId).delete();
  closeModal();
}
</script>
</body>
</html>
